settings.llmClient.temperature.comment=采样温度的取值，介于 0 到 2 之间。较高的值（如 0.8）会使输出更随机，\
而较低的值（如 0.2）会使输出更集中、更具确定性。
settings.llmClient.streamingResponse=流式响应
settings.llmClient.streamingResponse.contextHelp=部分模型不支持流式响应，将回退为普通响应。
settings.llmClient.topK=Top K
settings.llmClient.topK.comment=Top K 参数决定模型如何选择输出 token。\
  Top K 为 1 表示所选 token 是模型词表中所有 token 中概率最高的（也称贪心解码），\
  而 Top K 为 3 表示下一个 token 会在概率最高的 3 个 token 中使用温度采样选出。\
  在每一步 token 选择中，会对概率最高的 Top K 个 token 进行采样，\
  随后根据 topP 进一步过滤，最终使用温度采样确定 token。
settings.llmClient.topP=Top P
settings.llmClient.topP.comment=Top P 参数决定模型如何选择输出 token。\
  token 从概率高到低被选中，直到它们的概率之和等于 Top P 值。\
  例如，若 token A、B、C 的概率分别为 0.3、0.2、0.1，Top P 值为 0.5，\
  则模型会使用温度在 A 或 B 中选择下一个 token，并将 C 排除为候选。
